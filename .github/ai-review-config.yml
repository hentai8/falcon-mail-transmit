# AI 代码审核配置文件
# 用于定义审核范围、规则和输出格式

# AI 模型配置
model:
  name: "claude-sonnet-4-6"  # Claude 模型版本
  max_tokens: 8192            # 最大响应 token 数
  temperature: 0              # 温度参数（0 = 确定性输出）

# 输出配置
output:
  language: "zh-CN"           # 输出语言：zh-CN（中文）、en（英文）
  format: "markdown"          # 输出格式
  severity_labels:            # 严重级别标签
    critical: "🔴 严重"
    warning:  "🟡 警告"
    suggestion: "🔵 建议"

# 上下文分析配置
context_analysis:
  enabled: true                        # 是否启用完整上下文分析
  include_full_file: true              # 包含修改文件的完整内容
  max_file_size: 10000                 # 单个文件最大字符数（超过则只显示 diff）
  analyze_function_context: true       # 分析修改的函数完整上下文
  find_references: true                # 查找函数/类型的引用位置
  include_related_files: true          # 包含相关引用文件的内容
  max_related_files: 3                 # 最多包含的相关文件数
  context_instructions: |
    请特别关注：
    1. 修改是否影响了其他使用该函数/变量的地方
    2. 修改是否改变了函数签名、返回值或行为
    3. 调用者是否需要相应调整
    4. 是否存在潜在的破坏性变更

# 审核范围配置
review_scope:
  
  # 1. 代码质量检查
  code_quality:
    enabled: true
    priority: high
    checks:
      - name: "Go 代码规范"
        description: "检查是否符合 Go 官方代码规范和社区最佳实践"
      - name: "命名约定"
        description: "检查变量、函数、类型的命名是否清晰、符合 Go 惯例"
      - name: "代码复杂度"
        description: "检查函数复杂度，建议拆分过于复杂的函数"
      - name: "代码可读性"
        description: "评估代码的可读性和理解难度"
      - name: "重复代码"
        description: "识别重复代码，建议提取公共函数"
      - name: "代码组织"
        description: "检查包结构、文件组织是否合理"
  
  # 2. 安全性检查
  security:
    enabled: true
    priority: critical
    checks:
      - name: "潜在安全漏洞"
        description: "识别常见的安全漏洞模式"
      - name: "敏感信息泄露"
        description: "检查是否存在硬编码的密钥、密码、token 等敏感信息"
      - name: "SQL/NoSQL 注入"
        description: "检查数据库查询是否存在注入风险"
      - name: "XSS/CSRF 风险"
        description: "检查 Web 相关的安全问题"
      - name: "输入验证"
        description: "检查用户输入是否经过适当验证和清理"
      - name: "错误处理"
        description: "确保错误处理不会泄露敏感信息"
  
  # 3. 性能检查
  performance:
    enabled: true
    priority: medium
    checks:
      - name: "并发安全"
        description: "检查 goroutine、channel、锁的使用是否安全"
      - name: "资源泄露"
        description: "检查连接、文件句柄、goroutine 是否正确关闭"
      - name: "死锁和竞态条件"
        description: "识别可能的死锁和竞态条件"
      - name: "内存性能"
        description: "检查不必要的内存分配和拷贝"
      - name: "算法效率"
        description: "评估算法的时间复杂度和空间复杂度"
  
  # 4. Go 最佳实践
  go_best_practices:
    enabled: true
    priority: high
    checks:
      - name: "Context 使用"
        description: "检查 context 的正确传递和使用"
      - name: "错误处理模式"
        description: "检查 error 的处理是否符合 Go 惯例"
      - name: "Defer/Panic/Recover"
        description: "检查资源清理和错误恢复是否正确"
      - name: "Interface 设计"
        description: "评估 interface 的设计是否合理"
      - name: "包依赖"
        description: "检查包之间的依赖关系是否清晰"
      - name: "标准库使用"
        description: "建议使用标准库而非第三方库（如适用）"
  
  # 5. 可维护性
  maintainability:
    enabled: true
    priority: medium
    checks:
      - name: "代码注释"
        description: "检查关键函数和复杂逻辑是否有充分注释"
      - name: "函数长度"
        description: "建议过长函数应该拆分"
      - name: "测试相关"
        description: "提供测试覆盖率建议和测试用例建议"
      - name: "文档完善性"
        description: "检查公开 API 是否有文档注释"

# 忽略规则
ignore:
  # 忽略的文件模式（支持 glob 通配符）
  files:
    - "vendor/*"
    - "**/*_test.go"           # 可选：是否审核测试文件
    - "**/mock_*.go"
    - "**/*.pb.go"             # protobuf 生成的文件
  
  # 忽略的检查项（按检查名称）
  checks: []
    # - "代码注释"             # 示例：忽略注释检查

# 严重级别阈值配置
severity_thresholds:
  # 如果发现以下数量的问题，应该阻止合并
  block_merge:
    critical: 1               # 发现 1 个严重问题就阻止
    warning: 5                # 发现 5 个警告就阻止
  
  # 是否在审核报告中包含正面反馈
  include_positive_feedback: true

# 审核提示词模板
prompt_template:
  system: |
    你是一个专业的 Go 语言代码审核专家。你的任务是对提交的代码进行全面审核。
    
    审核时请遵循配置文件中定义的审核范围和检查项。
    
    审核输出格式要求：
    - 使用 {language} 输出
    - 使用 {format} 格式
    - 为每个问题标注严重级别：{severity_labels}
    - 提供具体的代码位置和改进建议
    - 如果代码质量很好，也要给予正面反馈
    - 总结部分要简洁明了
    
    请专业、客观、建设性地进行审核。
  
  user_prefix: |
    # 代码审核请求
    
    请根据以下审核范围对代码进行审核：

# 扩展配置（未来功能）
extensions:
  # 自定义审核规则脚本
  custom_scripts: []
  
  # 集成其他工具的结果
  integrate_tools:
    - name: "golangci-lint"
      enabled: false
    - name: "gosec"
      enabled: false
