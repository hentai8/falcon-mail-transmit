name: AI Code Review with Claude

on:
  push:
    branches:
      - main

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 需要 write 权限才能创建 commit comments
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整的 git 历史以便比较

      - name: Get changed files
        id: changed-files
        run: |
          if [ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | grep '\.go$' || true)
          else
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '\.go$' || true)
          fi
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No Go files changed"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            
            # Save file list to a temporary file for reliable passing
            echo "$CHANGED_FILES" > /tmp/changed_files.txt
            
            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            echo "Changed Go files:"
            echo "$CHANGED_FILES"
          fi

      - name: Setup Python
        if: steps.changed-files.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          pip install anthropic pyyaml

      - name: Run AI Code Review
        if: steps.changed-files.outputs.has_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/ai_review.py \
            --files-file /tmp/changed_files.txt \
            --commit-sha "${{ github.sha }}" \
            --repo "${{ github.repository }}" \
            --before-sha "${{ github.event.before }}"

      - name: No changes to review
        if: steps.changed-files.outputs.has_changes == 'false'
        run: |
          echo "No Go files changed in this push, skipping code review"
